trigger:
  - none

pool:
  vmImage: 'ubuntu-latest'
variables:
  project_id: 'deft-processor-493715-k5'

steps:
- task: DownloadSecureFile@1
  name: gcpKey
  inputs:
    secureFile: 'gcp-key.json'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      export GOOGLE_APPLICATION_CREDENTIALS=$(gcpKey.secureFilePath)
      gcloud auth activate-service-account --key-file=$(gcpKey.secureFilePath)
      gcloud config set project $(project_id)
      gcloud projects list
    


- checkout: self
- task: Bash@3
  displayName: 'Enable Required APIs'
  inputs:
    targetType: 'inline'
    script: |
      gcloud services enable \
        container.googleapis.com \
        compute.googleapis.com \
        iam.googleapis.com \
        storage-api.googleapis.com \
        --project $(project_id)
      echo "APIs enabled; waiting 30s for propagation..."
      sleep 30
  env:
    GOOGLE_APPLICATION_CREDENTIALS: $(gcpKey.secureFilePath)

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.6.0'

# Run Terraform with the GCP key
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      
      # Navigate to Terraform directory
      # cd terraform-gke
      pwd
      ls -lrt
      cd terraform-gke
      ls -lrt
      # Initialize Terraform
       terraform init 
       terraform plan -var-file=main.tfvars
  env:
    GOOGLE_APPLICATION_CREDENTIALS: $(gcpKey.secureFilePath)
      

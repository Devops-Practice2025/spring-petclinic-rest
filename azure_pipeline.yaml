trigger:
  - none

variables:
  acrLoginServer: testacrw6q309.azurecr.io
  imageName: petclinic-app
  imageTag: $(Build.BuildId)
  resourceGroupName: nebula-sandbox-karthikeyangopal-9b56a248
  aksName: test-aks
stages:
- stage: Build_and_Push
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Login to ACR (Managed Identity)
      inputs:
        azureSubscription: test-azure
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name testacrw6q309
    - task: Maven@4
      displayName: Build JAR
      inputs:
        mavenPomFile: pom.xml
        goals: clean package
        options: -DskipTests
        javaHomeOption: JDKVersion
        jdkVersionOption: 17

    - task: AzureCLI@2
      displayName: Build & Push Image to ACR (WIF)
      inputs:
        azureSubscription: test-azure
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name testacrw6q309

          docker build \
            -t $(acrLoginServer)/$(imageName):$(imageTag) \
            -t $(acrLoginServer)/$(imageName):latest \
            .

          docker push $(acrLoginServer)/$(imageName):$(imageTag)
          docker push $(acrLoginServer)/$(imageName):latest

- stage: Deploy_to_AKS
  dependsOn: Build_and_Push
  jobs:
  - job: Deploy
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - script: |
        sed -i 's|__IMAGE__|$(acrLoginServer)/$(imageName):$(imageTag)|g' spring-petclinic-rest/aks/deploy.yaml
      displayName: Inject image tag

    - task: Kubernetes@1
      displayName: Deploy using YAML
      inputs:
        connectionType: Azure Resource Manager
        azureSubscriptionEndpoint: test-azure
        azureResourceGroup: $(resourceGroupName)
        kubernetesCluster: $(aksName)
        command: apply
        useConfigurationFile: true
        configuration: spring-petclinic-rest/aks/*.yaml
trigger:
  - none

variables:
  acrLoginServer: testacrw6q309.azurecr.io
  imageName: petclinic-app
  imageTag: $(Build.BuildId)
  resourceGroupName: nebula-sandbox-karthikeyangopal-9b56a248
  aksName: test-aks

stages:
- stage: Build_and_Push
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Login to ACR (Managed Identity)
      inputs:
        azureSubscription: test-azure
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name testacrw6q309

    - task: Maven@4
      displayName: Build JAR
      inputs:
        mavenPomFile: pom.xml
        goals: clean package
        options: -DskipTests
        javaHomeOption: JDKVersion
        jdkVersionOption: 17

    - task: AzureCLI@2
      displayName: Build & Push Image to ACR (WIF)
      inputs:
        azureSubscription: test-azure
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name testacrw6q309

          docker build \
            -t $(acrLoginServer)/$(imageName):$(imageTag) \
            -t $(acrLoginServer)/$(imageName):latest \
            .

          docker push $(acrLoginServer)/$(imageName):$(imageTag)
          docker push $(acrLoginServer)/$(imageName):latest

- stage: Deploy_to_AKS
  dependsOn: Build_and_Push
  jobs:
  - job: Deploy
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - script: |
        # Check if the file exists at root level first
        if [ -f "deploy.yaml" ]; then
          sed -i 's|testacr090426.azurecr.io/petclinic-app:v1|$(acrLoginServer)/$(imageName):$(imageTag)|g' deploy.yaml
          echo "Updated deploy.yaml at root level"
        elif [ -f "spring-petclinic-rest/deploy.yaml" ]; then
          sed -i 's|testacr090426.azurecr.io/petclinic-app:v1|$(acrLoginServer)/$(imageName):$(imageTag)|g' spring-petclinic-rest/deploy.yaml
          echo "Updated spring-petclinic-rest/deploy.yaml"
        else
          echo "Could not find deploy.yaml file"
          ls -la
          find . -name "*.yaml" -o -name "*.yml"
          exit 1
        fi
      displayName: Inject image tag

    - task: Kubernetes@1
      displayName: Deploy using YAML
      inputs:
        connectionType: Azure Resource Manager
        azureSubscriptionEndpoint: test-azure
        azureResourceGroup: $(resourceGroupName)
        kubernetesCluster: $(aksName)
        command: apply
        useConfigurationFile: true
        configuration: deploy.yaml  # Change this to the correct path
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: petclinic-monitor
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: petclinic-app
  endpoints:
  - port: http
    path: /petclinic/actuator/prometheus
    interval: 15s
  namespaceSelector:
    matchNames:
    - default
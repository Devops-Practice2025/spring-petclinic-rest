apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-app
  nameSpace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic-app
  template:
    metadata:
      labels:
        app: petclinic-app
    spec:
      containers:
      - name: petclinic-app
        image: ${IMAGE_PLACEHOLDER}
        ports:
        - containerPort: 9966
        resources:
          requests:
            cpu: "200m"
            memory: "250Mi"
          limits:
            cpu: "512m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /petclinic/api/pettypes
            port: 9966
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /petclinic/api/pettypes
            port: 9966
          initialDelaySeconds: 30
          periodSeconds: 10

# azure_pipeline.yaml
trigger:
  - none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'test-azure'  # Using Managed Identity
  resourceGroupName: 'nebula-sandbox-karthikeyangopal-7114dfd4'
  terraformVersion: '1.5.7'
  terraformWorkingDir: '$(System.DefaultWorkingDirectory)/terraform'

stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: Validate
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstallerV4@4
            displayName: Install Terraform
            inputs:
              version: $(terraformVersion)
              workingDirectory: $(terraformWorkingDir)    

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(terraformWorkingDir)
              backendServiceArm: $(azureServiceConnection)

          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: $(terraformWorkingDir)
              environmentServiceNameAzureRM: $(azureServiceConnection)

  

# azure_pipeline.yaml

trigger:
  - none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'test-azure'  # Using Managed Identity
  resourceGroupName: 'testrg1'
  terraformVersion: '1.5.7'
  terraformWorkingDir: '$(System.DefaultWorkingDirectory)/terraform'
  backendStoragecontainerName: 'tfstateacct2704'
  

stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: Validate
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: AzureCLI@2
            displayName: Check Azure auth
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show
                az account get-access-token --resource https://management.azure.com/ >/dev/null
                echo "Auth OK"
                
          - task: AzureCLI@2
            displayName: 'Run Terraform Script'
            inputs:
              azureSubscription: 'test-azure' # Your Service Connection
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                cd $(terraformWorkingDir)/backend
                terraform init
                terraform plan
                terraform apply -auto-approve


          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(terraformWorkingDir)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(resourceGroupName)
              backendAzureRmStorageAccountName: $(backendStoragecontainerName)
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'test.tfstate'


          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: $(terraformWorkingDir)
              environmentServiceNameAzureRM: $(azureServiceConnection)
              commandOptions: '-var-file=main.tfvars'
          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: $(terraformWorkingDir)
              environmentServiceNameAzureRM: $(azureServiceConnection)
              commandOptions: '-var-file=main.tfvars'


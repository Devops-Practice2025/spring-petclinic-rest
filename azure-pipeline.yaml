# Azure Pipeline for Petclinic App - Build → ACR → Deploy to AKS

trigger:
  branches:
    include:
      - main

variables:
  # Container Registry variables
  acrName: 'testacr050426'
  acrLoginServer: 'testacr050426.azurecr.io'
  imageName: 'petclinic-app'
  imageTag: '$(Build.BuildId)'
  
  # AKS variables - UPDATE THESE
  resourceGroupName: 'YOUR_RESOURCE_GROUP'
  aksName: 'YOUR_AKS_CLUSTER_NAME'
  deploymentName: 'petclinic-app'
  containerName: 'petclinic-app'

stages:
  - stage: Build_and_Push
    displayName: 'Build Docker Image & Push to ACR'
    jobs:
      - job: Build
        displayName: 'Build and Push'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: '$(acrLoginServer)'
          
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              dockerfile: '$(System.DefaultWorkingDirectory)/Dockerfile'
              repository: '$(imageName)'
              tags: |
                $(imageTag)
                latest
          
          - task: Docker@2
            displayName: 'Push to ACR'
            inputs:
              command: push
              repository: '$(imageName)'
              tags: |
                $(imageTag)
                latest

  - stage: Deploy_to_AKS
    displayName: 'Deploy to AKS'
    dependsOn: Build_and_Push
    jobs:
      - job: Deploy
        displayName: 'Deploy Application'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: Kubernetes@1
            displayName: 'Set AKS Context'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: 'YOUR_SERVICE_CONNECTION_NAME'
              azureResourceGroup: '$(resourceGroupName)'
              kubernetesCluster: '$(aksName)'
              command: 'get'
              arguments: 'nodes'
          
          - task: Kubernetes@1
            displayName: 'Update Deployment Image'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: 'YOUR_SERVICE_CONNECTION_NAME'
              azureResourceGroup: '$(resourceGroupName)'
              kubernetesCluster: '$(aksName)'
              command: 'set'
              arguments: 'image deployment/$(deploymentName) $(containerName)=$(acrLoginServer)/$(imageName):$(imageTag) -n default'
          
          - task: Kubernetes@1
            displayName: 'Rollout Status'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: 'YOUR_SERVICE_CONNECTION_NAME'
              azureResourceGroup: '$(resourceGroupName)'
              kubernetesCluster: '$(aksName)'
              command: 'rollout'
              arguments: 'status deployment/$(deploymentName) -n default'